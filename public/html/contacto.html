    <link rel="stylesheet" href="css/styles.css">
    <title>Contacto</title>

<body>
    <header id="cabeza">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <img src="images/logo.png" width="150">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link enlace" aria-current="page" href="/">Inicio</a>

                </div>

        <div class="container espacio">
            <h1>Contactanos</h1>
            <p>Si tienes alguna duda sobre nuestros productos o su calidad no dudes en contactarnos</p>
            <div class="row justify-content-md-center mt-5">
                <div class="col-md-6">
                    <form>
                        <input type="text" placeholder="Nombre" class="form-control mb-3">
                        <input type="email" placeholder="Correo electronico" class="form-control mb-3">
                        <input type="text" placeholder="Numero telefonico" class="form-control mb-3">
                        <textarea placeholder="Pon tu mensaje aqui..." class="form-control mb-3" style="min-height: 8em;"></textarea>
                        <button type="button" class="btn btn-outline-primary">Enviar</button>
                    </form>
                </div>
            </div>
        </div>

    <footer id="pie">
        <div class="container">
            <div class="row justify-content-md-center">
                <div class="col-md-8">
